<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ричард — Календарь</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--tg-theme-bg-color, #faf6f1);
    color: var(--tg-theme-text-color, #3d2e22);
    min-height: 100vh;
    padding: 16px 16px 32px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 800;
  }
  .header .date {
    font-size: 13px;
    color: #a08c7a;
    font-weight: 600;
  }

  .section {
    margin-bottom: 24px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #a08c7a;
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .task-card {
    background: var(--tg-theme-secondary-bg-color, #fff);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .task-card.done {
    opacity: 0.45;
  }

  .priority-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .priority-dot.high   { background: #e05252; }
  .priority-dot.medium { background: #e0a832; }
  .priority-dot.low    { background: #6aaa64; }

  .task-info {
    flex: 1;
    min-width: 0;
  }
  .task-title {
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-notes {
    font-size: 12px;
    color: #a08c7a;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .done-btn {
    background: none;
    border: 2px solid #ddd0c3;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .done-btn:active { transform: scale(0.9); }
  .done-btn.checked {
    background: #6aaa64;
    border-color: #6aaa64;
    color: white;
  }

  .empty {
    text-align: center;
    padding: 32px 0;
    color: #c4b5a5;
    font-size: 14px;
    font-weight: 600;
  }
  .empty-icon { font-size: 36px; margin-bottom: 8px; }

  .loading {
    text-align: center;
    padding: 40px 0;
    color: #a08c7a;
    font-size: 14px;
  }

  .refresh-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--tg-theme-button-color, #c2552a);
    color: var(--tg-theme-button-text-color, #fff);
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📅 Задачи</h1>
  <div class="date" id="headerDate"></div>
</div>

<div id="content"><div class="loading">Загружаю...</div></div>

<button class="refresh-btn" onclick="loadTasks()">Обновить</button>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // Header date
  const now = new Date();
  document.getElementById('headerDate').textContent = now.toLocaleDateString('ru-RU', {
    day: 'numeric', month: 'long'
  });

  const PRIORITY_LABEL = { high: 'Срочно', medium: 'Важно', low: 'Не горит' };

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }
  function tomorrowStr() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    return d.toISOString().slice(0, 10);
  }
  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
  }

  async function loadTasks() {
    document.getElementById('content').innerHTML = '<div class="loading">Загружаю...</div>';
    try {
      const res = await fetch('/api/tasks');
      const data = await res.json();
      renderTasks(data.tasks || []);
    } catch {
      document.getElementById('content').innerHTML =
        '<div class="empty"><div class="empty-icon">⚠️</div>Не удалось загрузить задачи</div>';
    }
  }

  function renderTasks(tasks) {
    const today = todayStr();
    const tomorrow = tomorrowStr();

    const groups = {
      today:    { label: 'Сегодня', items: [] },
      tomorrow: { label: 'Завтра',  items: [] },
      later:    { label: 'Позже',   items: [] },
    };

    for (const t of tasks) {
      if (t.date === today)         groups.today.items.push(t);
      else if (t.date === tomorrow) groups.tomorrow.items.push(t);
      else                          groups.later.items.push(t);
    }

    const sortFn = (a, b) =>
      ({'high':0,'medium':1,'low':2}[a.priority]||3) -
      ({'high':0,'medium':1,'low':2}[b.priority]||3);

    let html = '';
    let hasAny = false;

    for (const [key, group] of Object.entries(groups)) {
      if (!group.items.length) continue;
      hasAny = true;
      group.items.sort(sortFn);
      html += `<div class="section">
        <div class="section-title">${group.label}</div>`;
      for (const t of group.items) {
        const dateLabel = key === 'later' ? ` · ${formatDate(t.date)}` : '';
        html += `
        <div class="task-card" id="card-${t.id}">
          <div class="priority-dot ${t.priority}"></div>
          <div class="task-info">
            <div class="task-title">${escHtml(t.title)}</div>
            ${t.notes ? `<div class="task-notes">${escHtml(t.notes)}${dateLabel}</div>` : (dateLabel ? `<div class="task-notes">${dateLabel.trim()}</div>` : '')}
          </div>
          <button class="done-btn" id="btn-${t.id}" onclick="markDone('${t.id}')" title="Выполнено">✓</button>
        </div>`;
      }
      html += `</div>`;
    }

    if (!hasAny) {
      html = `<div class="empty"><div class="empty-icon">🎉</div>Задач нет — отдыхай!</div>`;
    }

    document.getElementById('content').innerHTML = html;
  }

  async function markDone(id) {
    const btn = document.getElementById('btn-' + id);
    const card = document.getElementById('card-' + id);
    if (!btn || btn.classList.contains('checked')) return;

    btn.classList.add('checked');
    btn.textContent = '✓';

    try {
      await fetch(`/api/tasks/${id}/done`, { method: 'POST' });
      setTimeout(() => {
        card.classList.add('done');
        setTimeout(() => card.remove(), 400);
      }, 300);
    } catch {
      btn.classList.remove('checked');
      btn.textContent = '✓';
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadTasks();
</script>
</body>
</html>
